<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&G Cozinha Paraibana</title>
    <link rel="icon" type="image/png" href="Imagens/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff7f0; 
            color: #333333; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo {
            width: 250px;
            height: auto;
            transition: transform 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 3em;
            color: #d35400; 
            font-weight: bold;
        }

        p {
            font-size: 1.2em;
            color: #555555; 
            max-width: 400px;
        }

        .btn {
            background: linear-gradient(45deg, #d35400, #e67e22);
            color: white;
            padding: 15px 45px;
            font-size: 1.2em;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(45deg, #e67e22, #d35400);
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            p {
                font-size: 1em;
                max-width: 90%;
            }
            .btn {
                padding: 12px 30px;
                font-size: 1em;
            }
            .logo {
                width: 140px;
            }
        }
        
    </style>
</head>
<body>
    <div class="container">
        <img src="Imagens/logo.png" alt="Logo D&G" class="logo">
        <h1>D&G Cozinha Paraibana</h1>
        <p>Bem-vindo ao sabor da Paraíba!<br>Explore nossos pratos deliciosos.</p>
        <a href="Menu.html" class="btn">Ver Menu</a>
    </div>
</body>
</html>
